  .btn-refresh.loading { color: #f5a623; border-color: #f5a623; }
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid #2a2a2a; margin-bottom: 1.25rem; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { font-size: 13px; padding: 7px 14px; border: none; background: none; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; font-family: inherit; font-weight: 500; }
  .tab.active { color: #f0f0f0; border-bottom-color: #f0f0f0; }
  .section { display: none; }
  .section.active { display: block; }
  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input { width: 100%; background: #1a1a1a; border: 1px solid #2e2e2e; border-radius: 10px; color: #f0f0f0; font-family: inherit; font-size: 15px; padding: 10px 36px 10px 14px; -webkit-appearance: none; }
  .search-wrap input:focus { outline: none; border-color: #555; }
  .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #555; cursor: pointer; font-size: 16px; }
  .day-block { margin-bottom: 1.5rem; }
  .day-header { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
  .day-date { font-size: 11px; color: #555; font-weight: 400; text-transform: none; letter-spacing: 0; }
  .signing-card { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; }
  .signing-time { font-size: 12px; color: #f5a623; font-weight: 600; white-space: nowrap; min-width: 95px; padding-top: 2px; }
  .signing-body { flex: 1; min-width: 0; }
  .signing-creators { font-size: 14px; font-weight: 600; color: #f0f0f0; line-height: 1.4; }
  .signing-location { font-size: 12px; color: #666; margin-top: 3px; }
  .signing-notes { font-size: 12px; color: #aaa; margin-top: 4px; line-height: 1.4; font-style: italic; }
  .badge-section { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
  .badge-portal { background: #2a1a4a; color: #a78bfa; }
  .badge-offsite { background: #1a3a1a; color: #4ade80; }
  .empty { text-align: center; padding: 3rem 1rem; color: #555; font-size: 14px; }
  .last-updated { font-size: 11px; color: #444; text-align: center; margin-top: 1.5rem; }
  .refresh-note { font-size: 12px; color: #555; text-align: center; margin-top: 8px; line-height: 1.5; }
</style>
</head>

const DAY_LABELS = {
  wed:{label:'Wednesday',date:'July 22'},
  thu:{label:'Thursday',date:'July 23'},
  fri:{label:'Friday',date:'July 24'},
  sat:{label:'Saturday',date:'July 25'},
  sun:{label:'Sunday',date:'July 26'},
  tba:{label:'TBA',date:'Dates & Times TBA'}
};

let lastRefreshed = new Date();

function signingHTML(s) {
  const portalBadge = s.portal ? '<span class="badge-section badge-portal">Portal</span>' : '';
  const offsiteBadge = s.offsite ? '<span class="badge-section badge-offsite">Offsite</span>' : '';
  return `<div class="signing-card">
    <div class="signing-time">${s.time}</div>
    <div class="signing-body">
      <div class="signing-creators">${s.creators}${portalBadge}${offsiteBadge}</div>
      <div class="signing-location">${s.location}</div>
      ${s.notes ? `<div class="signing-notes">${s.notes}</div>` : ''}
    </div>
  </div>`;
}

function renderDay(dayKey) {
  const signings = SIGNINGS[dayKey] || [];
  const {label, date} = DAY_LABELS[dayKey];
  return `<div class="day-block">
    <div class="day-header"><span>${label}</span><span class="day-date">${date}</span></div>
    ${signings.map(s => signingHTML(s)).join('')}
  </div>`;
}

function renderAll() {
  document.getElementById('tab-all').innerHTML = ['wed','thu','fri','sat','sun','tba'].map(d => renderDay(d)).join('');
  ['wed','thu','fri','sat','sun','tba'].forEach(d => {
    document.getElementById('tab-'+d).innerHTML = renderDay(d);
  });
  document.getElementById('updated-time').textContent = 'Last rendered: ' + lastRefreshed.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function switchTab(name) {
  const names = ['all','wed','thu','fri','sat','sun','tba','search'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function doSearch() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const el = document.getElementById('search-results');
  if (!q) { el.innerHTML = '<div class="empty">Start typing to search signings.</div>'; return; }
  const results = [];
  Object.entries(SIGNINGS).forEach(([day, signings]) => {
    signings.forEach(s => {
      if (s.creators.toLowerCase().includes(q) || (s.location||'').toLowerCase().includes(q) || (s.notes||'').toLowerCase().includes(q)) {
        results.push({...s, day});
      }
    });
  });
  if (!results.length) { el.innerHTML = '<div class="empty">No results found.</div>'; return; }
  const byDay = {};
  results.forEach(r => { if(!byDay[r.day])byDay[r.day]=[]; byDay[r.day].push(r); });
  el.innerHTML = Object.entries(byDay).map(([day, items]) => {
    const {label, date} = DAY_LABELS[day];
    return `<div class="day-block"><div class="day-header"><span>${label}</span><span class="day-date">${date}</span></div>${items.map(s => signingHTML(s)).join('')}</div>`;
  }).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '<div class="empty">Start typing to search signings.</div>';
}

function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = 'Refreshing...';
  btn.classList.add('loading');
  lastRefreshed = new Date();
  renderAll();
  setTimeout(() => { btn.textContent = '\u21BB Refresh'; btn.classList.remove('loading'); }, 800);
}

renderAll();
